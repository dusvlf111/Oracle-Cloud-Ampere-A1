# Full-stack override: PostgreSQL + Redis 포함 호스팅 모드.
#
#   간단 모드 (SQLite + in-memory):
#     docker compose up -d
#   풀 모드 (PostgreSQL + Redis):
#     docker compose -f docker-compose.yml -f docker-compose.full.yml up -d
#     (또는 .env 에 COMPOSE_FILE=docker-compose.yml:docker-compose.full.yml 지정 후 docker compose up -d)
#
# DATABASE_URL / REDIS_URL 을 .env 에서 직접 지정하면 아래 기본값보다 우선합니다.
services:
  server:
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-oci}:${POSTGRES_PASSWORD:-oci}@postgres:5432/${POSTGRES_DB:-oci}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    # 내부 네트워크 전용 — 호스트 미노출 (server 와 동일한 차단 정책)
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oci}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oci}
      POSTGRES_DB: ${POSTGRES_DB:-oci}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oci} -d ${POSTGRES_DB:-oci}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
