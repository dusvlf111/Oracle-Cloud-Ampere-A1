services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    # NOTE: no `ports:` — the API server is NOT exposed to the host.
    # Only the `web` service (same compose network) can reach it.
    expose:
      - "8000"
    environment:
      # Default: SQLite on the /data volume. To use PostgreSQL instead, start
      # the postgres profile and set DATABASE_URL in .env, e.g.:
      #   docker compose --profile postgres up -d
      #   DATABASE_URL=postgresql+psycopg://oci:oci@postgres:5432/oci
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/app.db}
      APP_SECRET: ${APP_SECRET}
      APP_USERNAME: ${APP_USERNAME}
      APP_PASSWORD_HASH: ${APP_PASSWORD_HASH}
      CORS_ORIGINS: ${CORS_ORIGINS}
      OCI_MAX_CONCURRENT: ${OCI_MAX_CONCURRENT:-10}
      OCI_PER_CREDENTIAL_MAX: ${OCI_PER_CREDENTIAL_MAX:-1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_LEVEL_DB: ${LOG_LEVEL_DB:-INFO}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-7}
      LOG_RETENTION_ROWS: ${LOG_RETENTION_ROWS:-10000}
      # PostgreSQL pool tuning (only applied when DATABASE_URL is postgres).
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      DB_POOL_PRE_PING: ${DB_POOL_PRE_PING:-true}
      # Redis rate-limit storage (empty = in-memory). See redis profile below.
      REDIS_URL: ${REDIS_URL:-}
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"   # the only host-exposed port
    environment:
      INTERNAL_API_URL: http://server:8000   # used by Next.js rewrites (server-side only)
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  # --- Optional PostgreSQL (profile: postgres) ---------------------------
  # Enable with `docker compose --profile postgres up -d` and set in .env:
  #   DATABASE_URL=postgresql+psycopg://oci:oci@postgres:5432/oci
  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oci}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oci}
      POSTGRES_DB: ${POSTGRES_DB:-oci}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oci} -d ${POSTGRES_DB:-oci}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
