[alembic]
# %(here)s = directory of this ini file, so alembic works from any CWD
# (repo-root `pnpm dev:server` as well as `cd apps/server`).
script_location = %(here)s/alembic
prepend_sys_path = %(here)s/src
path_separator = os

# sqlalchemy.url is resolved at runtime from app settings (see alembic/env.py).
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
